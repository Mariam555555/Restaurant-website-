<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
       
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        
            background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fmedia.istockphoto.com%2Fid%2F1446478827%2Fphoto%2Fa-chef-is-cooking-in-his-restaurants-kitchen.jpg%3Fb%3D1%26s%3D612x612%26w%3D0%26k%3D20%26c%3DENiwiKPJOCT7PhV9BlHBmVoyiOeGX3zaCRgjiKara5Q%3D&f=1&nofb=1&ipt=3a6292bf0e3bda82fbe4aba20931c10576d06ffac2f70676911e51fda854f15a') no-repeat center center/cover; 
            position: relative;
        }

        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

       
        .forget-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            color: #fff;
            animation: fadeIn 0.8s ease-in-out;
        }

      
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .forget-container h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .forget-container p {
            font-size: 14px;
            color: #dcdcdc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

      
        .input-box {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            outline: none;
            border-radius: 30px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #fff;
        }

       
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
        }

       
        .back-login {
            font-size: 14px;
            margin-top: 10px;
        }

        .back-login a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-login a:hover {
            text-decoration: underline;
            color: #b3b3b3;
        }
    </style>
</head>
<body>

  
    

    <div class="forget-container">
        <h1>Forgot Password?</h1>
        <p>No worries! Enter your email address below and we'll send you a link to reset your password.</p>
        
       
      

<form id="resetForm" onsubmit="showMessage(event)">
    <div class="input-box">
        <i class='bx bxs-envelope'></i>
        
        <input type="email" placeholder="Enter your email address" required>
    </div>
    
  
    <button type="submit" class="submit-btn">Send Reset Link</button>
    
   
    <div id="successMessage" style="display:none; color: #fff; margin-top: 15px; background: rgba(0, 255, 0, 0.2); padding: 10px; border-radius: 10px; text-align: center;">
        ✅ Check your email! A reset link has been sent.
    </div>
    
    <div class="back-login" style="margin-top: 20px; text-align: center;">
        <p>Remember your password? <a href="../project web/login/index.html">Back to Login</a></p>
    </div>
</form>


<script>
    function showMessage(event) {
     
        event.preventDefault(); 
        
      
        document.getElementById('successMessage').style.display = 'block';
    }
</script>
</body>
</html>
